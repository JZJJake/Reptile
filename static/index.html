<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reptile — 智能知识库</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  display: flex;
  flex-direction: column;
}

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --text:    #c9d1d9;
  --muted:   #8b949e;
  --accent:  #388bfd;
  --green:   #3fb950;
  --red:     #f85149;
  --orange:  #d29922;
}

/* ── Header ── */
header {
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
}
header .brand { font-size: 20px; line-height: 1; }
header h1 { font-size: 15px; font-weight: 700; color: #f0f6fc; }
.header-sep { flex: 1; }
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; border-radius: 20px;
  padding: 3px 10px; letter-spacing: .04em;
}
.badge-idle     { background: #21262d; color: var(--muted);   border: 1px solid var(--border); }
.badge-running  { background: #16302b; color: var(--green);   border: 1px solid #196c2e; }
.badge-analyzing{ background: #2d2200; color: #e3b341;        border: 1px solid #6e4e00; }
.badge-paused   { background: #2d2200; color: var(--orange);  border: 1px solid #6e4e00; }
.badge-stopped  { background: #2d1317; color: var(--red);     border: 1px solid #6e211f; }
.badge-done     { background: #1b3a6b; color: #79c0ff;        border: 1px solid #1f6feb; }
.pulse {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Main ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 290px 1fr;
  min-height: 0;
  overflow: hidden;
}

/* ── Left ── */
.left {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--surface);
}

.panel {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
}
.field-lbl {
  font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px;
}
input[type=url], input[type=text], select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 10px;
  font-size: 12.5px;
  outline: none;
  transition: border-color .15s;
  font-family: inherit;
}
input:focus, select:focus { border-color: var(--accent); }

.chk-row { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
.chk-row input[type=checkbox] { width: auto; accent-color: var(--accent); cursor: pointer; }
.chk-row label { font-size: 11.5px; color: var(--muted); cursor: pointer; user-select: none; }

.btn-row { display: flex; gap: 6px; margin-top: 10px; }
.btn {
  flex: 1; padding: 7px 10px; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.btn:hover:not(:disabled) { opacity: .82; }
.btn:disabled { opacity: .28; cursor: not-allowed; }
.btn-primary { background: #238636; color: #fff; }
.btn-danger  { background: #b62324; color: #fff; }
.btn-warn    { background: #9e6a03; color: #fff; }
.btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }

/* Domains */
.domain-list { display: flex; flex-direction: column; gap: 4px; }
.domain-item {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; display: flex; align-items: center; gap: 7px;
  cursor: pointer; transition: border-color .15s;
}
.domain-item:hover { border-color: var(--accent); }
.domain-item .di-name { font-size: 12px; color: var(--text); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.domain-item .di-cnt  { font-size: 11px; color: var(--muted); flex-shrink: 0; }

/* ── Right ── */
.right {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0 16px;
  align-items: flex-end;
}
.tab {
  padding: 12px 18px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s; user-select: none; margin-bottom: -1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-pane {
  flex: 1; min-height: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.tab-pane.active { display: flex; }

/* ── Log tab ── */
.log-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.log-toolbar .lbl { font-size: 12px; color: var(--muted); flex: 1; }
.log-toolbar .lbl b { color: var(--text); }

.log-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 14px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.8;
  min-height: 0;
  background: var(--bg);
}
.log-entry { display: flex; gap: 8px; align-items: flex-start; }
.log-ts  { color: #484f58; flex-shrink: 0; min-width: 52px; }
.log-msg { flex: 1; word-break: break-word; }
.log-msg.success { color: var(--green); }
.log-msg.warn    { color: var(--orange); }
.log-msg.error   { color: var(--red); }
.log-msg.info    { color: #79c0ff; }
.log-msg.done    { color: var(--green); font-weight: 700; }
.log-msg.log     { color: var(--text); }
.log-empty { color: var(--muted); font-style: italic; padding: 16px 0; }

.log-footer {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.pages-count { font-size: 12px; color: var(--muted); flex: 1; }
.pages-count b { color: var(--text); }

/* ── Chat tab ── */
.chat-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.chat-toolbar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.chat-toolbar select { flex: 1; max-width: 260px; font-size: 12px; padding: 5px 8px; }
.chat-mode-lbl { font-size: 11px; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 0;
  background: var(--bg);
}

.msg-row { display: flex; gap: 10px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
  background: #21262d; border: 1px solid var(--border);
}

.msg-bubble {
  max-width: 74%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13.5px; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word;
}
/* After markdown render, collapse whitespace so HTML line-breaks don't show */
.msg-bubble.rendered { white-space: normal; }
.msg-row.user .msg-bubble {
  background: #1c3a6b;
  border: 1px solid #1f6feb66;
  color: #ddeeff;
  border-radius: 12px 4px 12px 12px;
}
.msg-row.assistant .msg-bubble {
  background: #21262d;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px 12px 12px 12px;
}

/* Rendered markdown inside assistant bubbles */
.msg-bubble .md-p { margin: 0 0 8px 0; }
.msg-bubble .md-p:last-child { margin-bottom: 0; }
.msg-bubble .md-h { font-weight: 700; color: #f0f6fc; margin: 10px 0 6px; line-height: 1.4; }
.msg-bubble .md-h1 { font-size: 1.25em; }
.msg-bubble .md-h2 { font-size: 1.15em; }
.msg-bubble .md-h3 { font-size: 1.06em; }
.msg-bubble .md-h4, .msg-bubble .md-h5, .msg-bubble .md-h6 { font-size: 1em; }
.msg-bubble .md-ul, .msg-bubble .md-ol { margin: 4px 0 8px; padding-left: 22px; }
.msg-bubble .md-ul li, .msg-bubble .md-ol li { margin: 2px 0; }
.msg-bubble strong { color: #f0f6fc; font-weight: 700; }
.msg-bubble em { font-style: italic; }
.msg-bubble .md-code {
  background: #0d1117; border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 5px; font-family: 'Consolas', monospace; font-size: .9em; color: #79c0ff;
}
.msg-bubble .md-pre {
  background: #0d1117; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin: 8px 0; overflow-x: auto;
}
.msg-bubble .md-pre code {
  font-family: 'Consolas', monospace; font-size: 12px; color: #c9d1d9; white-space: pre;
}
.msg-bubble .md-cite {
  background: #1c3a5e; color: #79c0ff; border-radius: 4px;
  padding: 0 5px; font-size: .9em; white-space: nowrap;
  cursor: pointer; text-decoration: none; border: none;
  font-family: inherit;
}
.msg-bubble .md-cite:hover { background: #1f4a7a; text-decoration: underline; }
.msg-bubble a { color: #58a6ff; text-decoration: none; }
.msg-bubble a:hover { text-decoration: underline; }

/* ── Wiki Viewer Panel ── */
.wiki-viewer {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 55%;
  background: var(--surface);
  border-left: 2px solid var(--accent);
  display: none; flex-direction: column;
  z-index: 50;
  box-shadow: -6px 0 24px rgba(0,0,0,.5);
}
.wiki-viewer-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  background: #1c2128; flex-shrink: 0;
}
.wiki-viewer-title {
  flex: 1; font-size: 12.5px; color: var(--text); font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.wiki-viewer-btn {
  background: none; border: 1px solid var(--border); cursor: pointer;
  color: var(--muted); font-size: 11px; padding: 3px 8px;
  border-radius: 4px; flex-shrink: 0; white-space: nowrap;
}
.wiki-viewer-btn:hover { background: #30363d; color: var(--text); }
.wiki-viewer-body {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  font-size: 13.5px; line-height: 1.7; color: var(--text);
  white-space: normal;
}
/* Inherit markdown styles inside viewer */
.wiki-viewer-body .md-h  { font-weight: 700; color: #f0f6fc; margin: 10px 0 6px; }
.wiki-viewer-body .md-h1 { font-size: 1.2em; }
.wiki-viewer-body .md-h2 { font-size: 1.1em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.wiki-viewer-body .md-h3 { font-size: 1em; }
.wiki-viewer-body .md-p  { margin: 0 0 8px; }
.wiki-viewer-body .md-ul, .wiki-viewer-body .md-ol { margin: 4px 0 8px; padding-left: 20px; }
.wiki-viewer-body .md-ul li, .wiki-viewer-body .md-ol li { margin: 2px 0; }
.wiki-viewer-body strong { color: #f0f6fc; }
.wiki-viewer-body .md-code {
  background: #0d1117; border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 5px; font-family: 'Consolas', monospace; font-size: .9em; color: #79c0ff;
}
.wiki-viewer-body .md-pre {
  background: #0d1117; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin: 8px 0; overflow-x: auto;
}
.wiki-viewer-body .md-pre code { font-family: 'Consolas', monospace; font-size: 12px; white-space: pre; }
.wiki-viewer-body .md-cite {
  background: #1c3a5e; color: #79c0ff; border-radius: 4px;
  padding: 0 5px; font-size: .9em; cursor: pointer;
  text-decoration: none; border: none; font-family: inherit;
}
.wiki-viewer-body .md-cite:hover { background: #1f4a7a; text-decoration: underline; }
/* Source file links */
.src-link {
  color: #79c0ff; font-size: .88em; font-family: 'Consolas', monospace;
  text-decoration: none; padding: 1px 4px; background: #1c2f50;
  border: 1px solid #1f3a6e; border-radius: 3px; white-space: nowrap;
}
.src-link:hover { background: #1f4a7a; }
.source-badge {
  display: inline-block; background: #1c2f50; color: #79c0ff;
  border: 1px solid #1f6feb; border-radius: 4px;
  padding: 3px 8px; font-size: 11px; margin-bottom: 12px;
  font-family: 'Consolas', monospace;
}

/* Typing animation */
.typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
  animation: tdot 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes tdot { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

.chat-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 8px; height: 100%;
  color: var(--muted); font-size: 14px;
  text-align: center;
}
.chat-empty .icon { font-size: 42px; }
.chat-empty .sub  { font-size: 12px; color: #484f58; margin-top: 2px; }

.chat-input-area {
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  background: var(--surface);
  flex-shrink: 0;
}
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 9px 12px;
  font-size: 13.5px;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 150px;
  transition: border-color .15s;
}
.chat-input-row textarea:focus { border-color: var(--accent); }
.send-btn {
  width: 42px; height: 42px; border-radius: 8px; border: none;
  background: #238636; color: #fff;
  font-size: 18px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { opacity: .82; }
.send-btn:disabled { opacity: .28; cursor: not-allowed; }
.chat-hint { font-size: 11px; color: #484f58; margin-top: 5px; }

/* Scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <span class="brand">🦎</span>
  <h1>Reptile 智能知识库</h1>
  <div class="header-sep"></div>
  <span class="status-badge badge-idle" id="status-badge">空闲</span>
  <span id="hdr-domain" style="font-size:12px;color:var(--muted);margin-left:6px;"></span>
</header>

<div class="main">

  <!-- ── Left Panel ── -->
  <div class="left">

    <!-- Crawl config -->
    <div class="panel">
      <div class="panel-title">网页采集</div>
      <label class="field-lbl">目标网址</label>
      <input type="url" id="url-input" placeholder="https://example.com/docs/"
             onkeydown="if(event.key==='Enter') startTask()">
      <div class="chk-row">
        <input type="checkbox" id="chk-update">
        <label for="chk-update">迭代更新（跳过已下载内容）</label>
      </div>
      <div class="chk-row">
        <input type="checkbox" id="chk-rebuild">
        <label for="chk-rebuild">重新初始化（清空历史数据）</label>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start" onclick="startTask()">▶ 开始</button>
        <button class="btn btn-ghost" id="btn-pause" onclick="togglePause()" disabled
                style="flex:none;padding:7px 11px;">⏸</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopTask()" disabled>⏹ 停止</button>
      </div>
    </div>

    <!-- Domains -->
    <div class="panel">
      <div class="panel-title">已采集域名</div>
      <div class="domain-list" id="domain-list">
        <div style="font-size:12px;color:var(--muted);">暂无已采集域名</div>
      </div>
    </div>

    <!-- Wiki build -->
    <div class="panel" style="border-bottom:none;flex:1;">
      <div class="panel-title">🧠 知识库建设</div>
      <label class="field-lbl">选择要建设的域名</label>
      <select id="wiki-sel" onchange="onWikiSelChange()">
        <option value="">— 请先选择域名 —</option>
      </select>
      <div class="btn-row">
        <button class="btn btn-warn" id="btn-wiki" onclick="buildWiki()" disabled>⚙ 开始建设</button>
      </div>
      <div id="wiki-status" style="font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;">
        建设完成后可在「知识问答」中查询
      </div>
    </div>

  </div>

  <!-- ── Right Panel ── -->
  <div class="right">

    <div class="tab-bar">
      <div class="tab active" id="tab-log"  onclick="switchTab('log')">状态日志</div>
      <div class="tab"        id="tab-chat" onclick="switchTab('chat')">知识问答</div>
    </div>

    <!-- Log pane -->
    <div class="tab-pane active" id="pane-log">
      <div class="log-toolbar">
        <div class="lbl" id="log-lbl">等待任务...</div>
        <button class="btn btn-ghost" onclick="clearLog()"
                style="flex:none;padding:4px 10px;font-size:11px;">清空</button>
      </div>
      <div class="log-area" id="log-area">
        <div class="log-empty">任务开始后日志将在此实时显示</div>
      </div>
      <div class="log-footer">
        <div class="pages-count" id="pages-count">已保存 <b>0</b> 篇 · 队列 <b>0</b></div>
      </div>
    </div>

    <!-- Chat pane -->
    <div class="tab-pane" id="pane-chat">
      <div class="chat-toolbar">
        <label>知识库</label>
        <select id="chat-sel" onchange="onChatSelChange()">
          <option value="">通用对话 (DeepSeek)</option>
        </select>
        <span class="chat-mode-lbl" id="chat-mode" style="color:var(--muted);">· 通用模式</span>
      </div>
      <div class="chat-messages" id="chat-msgs">
        <div class="chat-empty" id="chat-empty">
          <div class="icon">🤖</div>
          <div>输入问题开始对话</div>
          <div class="sub">选择左侧知识库域名可获得知识库增强回答</div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-ta" rows="1"
                    placeholder="输入问题，Enter 发送，Shift+Enter 换行..."
                    onkeydown="onChatKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendChat()">↑</button>
        </div>
        <div class="chat-hint">Enter 发送 · Shift+Enter 换行</div>
      </div>
    </div>

  <!-- Wiki Viewer Panel (overlays right panel, slide-in from right) -->
  <div id="wiki-viewer" class="wiki-viewer">
    <div class="wiki-viewer-hdr">
      <button id="wiki-viewer-back" class="wiki-viewer-btn" onclick="backViewer()" style="display:none">← 返回</button>
      <span id="wiki-viewer-title" class="wiki-viewer-title"></span>
      <button class="wiki-viewer-btn" onclick="closeWikiViewer()">✕ 关闭</button>
    </div>
    <div id="wiki-viewer-body" class="wiki-viewer-body"></div>
  </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const API_KEY = sessionStorage.getItem('api_key') || '';
let taskId = null;
let evtSrc = null;
let isRunning = false;
let isPaused = false;
let pagesDone = 0;
let pagesQueue = 0;
let chatHistory = [];   // [{role, content}]
let isChatBusy = false;
let wikiBuilding = false;
let currentViewDomain = '';    // domain shown in wiki viewer
let viewerHistory = [];        // navigation stack [{title, html}]

// ── Boot ───────────────────────────────────────────────────────────────────────
(function boot() {
  if (!API_KEY) { window.location.href = '/'; return; }
  loadDomains();
  reconnectActiveBuild();
  setInterval(loadDomains, 15000);
})();

// If a wiki build is already running on the server (e.g. after a page reload),
// reattach the live log so progress and breakpoint-resume stay visible.
async function reconnectActiveBuild() {
  try {
    const d = await (await fetch('/api/wiki/building')).json();
    if (d.building && d.building.length) {
      const domain = d.building[0];
      wikiBuilding = true;
      const sel = document.getElementById('wiki-sel');
      if ([...sel.options].some(o => o.value === domain)) sel.value = domain;
      onWikiSelChange();
      const btn = document.getElementById('btn-wiki');
      btn.textContent = '⏳ 建设中...';
      const statusEl = document.getElementById('wiki-status');
      statusEl.textContent = `⏳ 知识库建设进行中 (${domain})...`;
      statusEl.style.color = 'var(--orange)';
      document.getElementById('log-lbl').innerHTML = `知识库建设: <b>${esc(domain)}</b>`;
      setStatus('analyzing');
      switchTab('log');
      subscribeWikiEvents(domain, statusEl);
    }
  } catch(_) {}
}

// ── Tabs ───────────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['log', 'chat'].forEach(n => {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
    document.getElementById('pane-' + n).classList.toggle('active', n === name);
  });
}

// ── Domains ────────────────────────────────────────────────────────────────────
async function loadDomains() {
  try {
    const d = await (await fetch('/api/scrape/domains')).json();
    renderDomains(d.domains);
    fillSelects(d.domains);
  } catch(_) {}
}

function renderDomains(doms) {
  const el = document.getElementById('domain-list');
  if (!doms.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">暂无已采集域名</div>';
    return;
  }
  el.innerHTML = doms.map(d =>
    `<div class="domain-item" onclick="pickChatDomain('${esc(d.name)}')">
       <span style="font-size:14px;">🌐</span>
       <span class="di-name">${esc(d.name)}</span>
       <span class="di-cnt">${d.file_count}篇</span>
     </div>`
  ).join('');
}

function fillSelects(doms) {
  const opts = doms.map(d =>
    `<option value="${esc(d.name)}">${esc(d.name)} (${d.file_count}篇)</option>`
  ).join('');

  // Wiki select
  const ws = document.getElementById('wiki-sel');
  const wc = ws.value;
  ws.innerHTML = '<option value="">— 请先选择域名 —</option>' + opts;
  if (wc) ws.value = wc;

  // Chat select
  const cs = document.getElementById('chat-sel');
  const cc = cs.value;
  cs.innerHTML = '<option value="">通用对话 (DeepSeek)</option>' +
    doms.map(d => `<option value="${esc(d.name)}">📚 ${esc(d.name)}</option>`).join('');
  if (cc) cs.value = cc;

  onWikiSelChange();
  onChatSelChange();
}

function onWikiSelChange() {
  const v = document.getElementById('wiki-sel').value;
  document.getElementById('btn-wiki').disabled = !v || isRunning || wikiBuilding;
}

function onChatSelChange() {
  const v = document.getElementById('chat-sel').value;
  const lbl = document.getElementById('chat-mode');
  lbl.textContent = v ? `· 知识库: ${v}` : '· 通用模式';
  lbl.style.color = v ? 'var(--green)' : 'var(--muted)';
}

function pickChatDomain(domain) {
  document.getElementById('chat-sel').value = domain;
  onChatSelChange();
  switchTab('chat');
}

// ── Task control ───────────────────────────────────────────────────────────────
async function startTask() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { alert('请输入目标网址'); return; }

  clearLog();
  setStatus('running');
  switchTab('log');

  try {
    const r = await fetch('/api/scrape/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        api_key: API_KEY,
        update_data: document.getElementById('chk-rebuild').checked,
        update_mode: document.getElementById('chk-update').checked,
      }),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.detail || '启动失败'); setStatus('idle'); return; }

    taskId = d.task_id;
    const host = new URL(url).hostname;
    document.getElementById('hdr-domain').textContent = host;
    document.getElementById('log-lbl').innerHTML = `采集中: <b>${esc(host)}</b>`;

    subscribeSSE(taskId);
    isRunning = true;
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('btn-pause').disabled = false;
    onWikiSelChange();
  } catch(e) {
    alert(`请求错误: ${e.message}`);
    setStatus('idle');
  }
}

async function stopTask() {
  if (!taskId) return;
  await fetch(`/api/scrape/stop/${taskId}`, { method: 'POST' });
  finishTask('stopped');
}

async function togglePause() {
  if (!taskId) return;
  const btn = document.getElementById('btn-pause');
  if (isPaused) {
    await fetch(`/api/scrape/resume/${taskId}`, { method: 'POST' });
    isPaused = false; btn.textContent = '⏸'; setStatus('running');
  } else {
    await fetch(`/api/scrape/pause/${taskId}`, { method: 'POST' });
    isPaused = true; btn.textContent = '▶'; setStatus('paused');
  }
}

function finishTask(status) {
  isRunning = false;
  if (evtSrc) { evtSrc.close(); evtSrc = null; }
  setStatus(status);
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-pause').disabled = true;
  isPaused = false;
  document.getElementById('btn-pause').textContent = '⏸';
  document.getElementById('hdr-domain').textContent = '';
  onWikiSelChange();
  loadDomains();
}

// ── SSE ────────────────────────────────────────────────────────────────────────
function subscribeSSE(id) {
  if (evtSrc) evtSrc.close();
  evtSrc = new EventSource(`/api/scrape/events/${id}`);

  evtSrc.onmessage = (e) => {
    if (!e.data || e.data === 'null') { finishTask('done'); return; }
    try {
      const item = JSON.parse(e.data);
      if (item.type === 'ping') return;
      if (item.type === 'progress') {
        pagesDone = item.pages_done || 0;
        pagesQueue = item.pages_queue || 0;
        updateCount(); return;
      }
      if (item.type === 'done') {
        appendLog(item.ts, item.msg, 'done');
        pagesDone = item.pages_done || pagesDone;
        updateCount(); finishTask('done'); return;
      }
      appendLog(item.ts, item.msg, item.type);
      if (item.msg?.includes('DeepSeek')) setStatus('analyzing');
      else if (item.msg?.includes('爬取')) setStatus('running');
    } catch(_) {}
  };

  evtSrc.onerror = () => {
    if (isRunning) setTimeout(() => { if (isRunning) finishTask('stopped'); }, 3000);
  };
}

// ── Log helpers ────────────────────────────────────────────────────────────────
function appendLog(ts, msg, type) {
  if (!msg) return;
  const area = document.getElementById('log-area');
  const empty = area.querySelector('.log-empty');
  if (empty) empty.remove();
  const d = document.createElement('div');
  d.className = 'log-entry';
  d.innerHTML = `<span class="log-ts">${ts||''}</span><span class="log-msg ${type||'log'}">${esc(msg)}</span>`;
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function clearLog() {
  document.getElementById('log-area').innerHTML = '<div class="log-empty">等待任务开始...</div>';
  pagesDone = 0; pagesQueue = 0; updateCount();
  document.getElementById('log-lbl').textContent = '等待任务...';
}

function updateCount() {
  document.getElementById('pages-count').innerHTML =
    `已保存 <b>${pagesDone}</b> 篇 · 队列 <b>${pagesQueue}</b>`;
}

// ── Status ─────────────────────────────────────────────────────────────────────
function setStatus(s) {
  const el = document.getElementById('status-badge');
  const M = {
    idle:      ['badge-idle',      '空闲',   false],
    running:   ['badge-running',   '爬取中', true],
    analyzing: ['badge-analyzing', '分析中', true],
    paused:    ['badge-paused',    '已暂停', false],
    stopped:   ['badge-stopped',   '已停止', false],
    done:      ['badge-done',      '完成',   false],
  };
  const [cls, lbl, pulse] = M[s] || M.idle;
  el.className = `status-badge ${cls}`;
  el.innerHTML = (pulse ? '<span class="pulse"></span>' : '') + lbl;
}

// ── Wiki build ─────────────────────────────────────────────────────────────────
let wikiEvtSrc = null;

async function buildWiki() {
  if (wikiBuilding) return;          // guard: already building
  const domain = document.getElementById('wiki-sel').value;
  if (!domain) return;
  const btn = document.getElementById('btn-wiki');
  const statusEl = document.getElementById('wiki-status');

  wikiBuilding = true;
  btn.disabled = true;
  btn.textContent = '⏳ 建设中...';
  statusEl.textContent = '⏳ 正在启动知识库建设...';
  statusEl.style.color = 'var(--orange)';

  // Surface progress in the log tab so the user can watch it live.
  switchTab('log');
  clearLog();
  document.getElementById('log-lbl').innerHTML = `知识库建设: <b>${esc(domain)}</b>`;
  setStatus('analyzing');

  try {
    // Fire the build FIRST so the server creates the SSE queue, then attach.
    // (Attaching before the POST races with queue creation and loses events.)
    const r = await fetch('/api/wiki/build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain, api_key: API_KEY, batch_size: 5 }),
    });
    const d = await r.json();
    if (!r.ok) {
      statusEl.textContent = `❌ ${d.detail || '建设失败'}`;
      statusEl.style.color = 'var(--red)';
      appendLog('', d.detail || '建设失败', 'error');
      setStatus('stopped');
      endWikiBuild(domain, statusEl);
      return;
    }
    statusEl.textContent = `⏳ 知识库建设进行中 (${domain})...`;
    statusEl.style.color = 'var(--orange)';
    // Now subscribe — queue already exists, so no events are lost.
    subscribeWikiEvents(domain, statusEl);
  } catch(e) {
    statusEl.textContent = `网络错误: ${e.message}`;
    statusEl.style.color = 'var(--red)';
    setStatus('stopped');
    endWikiBuild(domain, statusEl);
  }
}

function endWikiBuild(domain, statusEl) {
  wikiBuilding = false;
  if (wikiEvtSrc) { wikiEvtSrc.close(); wikiEvtSrc = null; }
  const btn = document.getElementById('btn-wiki');
  btn.textContent = '⚙ 开始建设';
  btn.disabled = !document.getElementById('wiki-sel').value || isRunning;
}

function subscribeWikiEvents(domain, statusEl) {
  if (wikiEvtSrc) wikiEvtSrc.close();
  wikiEvtSrc = new EventSource(`/api/wiki/events/${encodeURIComponent(domain)}`);

  wikiEvtSrc.onmessage = (e) => {
    if (!e.data || e.data === 'null') {
      // build finished
      setStatus('done');
      refreshWikiStatus(domain, statusEl);
      loadDomains();
      endWikiBuild(domain, statusEl);
      return;
    }
    try {
      const item = JSON.parse(e.data);
      if (item.type === 'ping') return;
      appendLog(item.ts, item.msg, item.type);
      if (item.type === 'done') {
        statusEl.textContent = `✅ ${item.msg}`;
        statusEl.style.color = 'var(--green)';
      } else if (item.type === 'error') {
        statusEl.textContent = `❌ ${item.msg}`;
        statusEl.style.color = 'var(--red)';
      } else if (item.type === 'warn') {
        statusEl.textContent = `⚠ ${item.msg}`;
        statusEl.style.color = 'var(--orange)';
      }
    } catch(_) {}
  };

  wikiEvtSrc.onerror = () => {
    // EventSource auto-reconnects; only treat as terminal if we already saw
    // the sentinel. Here we just note the drop but keep build state until
    // a reconnect delivers the sentinel or the user reloads.
    refreshWikiStatus(domain, statusEl);
  };
}

async function refreshWikiStatus(domain, el) {
  try {
    const d = await (await fetch(`/api/wiki/status/${domain}`)).json();
    if (d.exists && d.page_count > 0) {
      el.textContent = `✅ 知识库已建设 ${d.page_count} 个页面`;
      el.style.color = 'var(--green)';
    }
  } catch(_) {}
}

// ── Chat ───────────────────────────────────────────────────────────────────────
function onChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

async function sendChat() {
  if (isChatBusy) return;
  const ta = document.getElementById('chat-ta');
  const msg = ta.value.trim();
  if (!msg) return;

  ta.value = ''; ta.style.height = 'auto';

  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  addChatBubble('user', msg);
  chatHistory.push({ role: 'user', content: msg });

  const domain = document.getElementById('chat-sel').value;
  isChatBusy = true;
  document.getElementById('send-btn').disabled = true;

  const typingId = addTypingIndicator();

  try {
    if (domain) {
      await streamWikiQuery(domain, msg, typingId);
    } else {
      await streamDirect(typingId);
    }
  } catch(e) {
    removeEl(typingId);
    addChatBubble('assistant', `❌ 错误: ${e.message}`);
  } finally {
    isChatBusy = false;
    document.getElementById('send-btn').disabled = false;
  }
}

async function streamDirect(typingId) {
  // System prompt is injected server-side (GENERAL_CHAT_SYSTEM) so replies stay focused.
  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: chatHistory, api_key: API_KEY, stream: true }),
  });
  if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).detail || '请求失败');
  await consumeStream(resp, typingId);
}

async function streamWikiQuery(domain, question, typingId) {
  const resp = await fetch('/api/wiki/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question, domain, api_key: API_KEY, stream: true }),
  });
  if (!resp.ok) {
    if (resp.status === 404) return streamDirect(typingId);
    throw new Error((await resp.json().catch(()=>({}))).detail || '知识库查询失败');
  }
  await consumeStream(resp, typingId);
}

async function consumeStream(resp, typingId) {
  removeEl(typingId);
  const bubbleId = 'b' + Date.now();
  addChatBubble('assistant', '', bubbleId);
  const bubble = document.getElementById(bubbleId);

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '', full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') break;
      try {
        const delta = JSON.parse(raw).delta || '';
        // Stream as plain text for smoothness; render markdown once complete.
        if (delta) { full += delta; bubble.textContent = full; scrollChat(); }
      } catch(_) {}
    }
  }

  // Final pass: render markdown, then switch off pre-wrap so HTML renders cleanly.
  bubble.innerHTML = renderMarkdown(full);
  bubble.classList.add('rendered');
  chatHistory.push({ role: 'assistant', content: full });
  scrollChat();
}

// Lightweight, safe Markdown → HTML (escapes first, then formats).
function renderMarkdown(src) {
  if (!src) return '';
  let s = esc(src);

  // Fenced code blocks ```...```
  s = s.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre class="md-pre"><code>${code.replace(/^\n/, '')}</code></pre>`);

  // Inline code `x`
  s = s.replace(/`([^`\n]+)`/g, '<code class="md-code">$1</code>');

  // Headings ###### .. #
  s = s.replace(/^(#{1,6})\s+(.+)$/gm, (_, h, txt) => {
    const lvl = Math.min(h.length, 6);
    return `<div class="md-h md-h${lvl}">${txt.trim()}</div>`;
  });

  // Bold / italic
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');

  // [[wiki page]] citations → clickable (data-wiki carries the raw name)
  s = s.replace(/\[\[([^\]]+)\]\]/g,
    '<a class="md-cite" href="#" data-wiki="$1" onclick="viewWikiPage(this);return false;">$1</a>');

  // Markdown links [text](url)
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Process lists & paragraphs line by line
  const lines = s.split('\n');
  const out = [];
  let inUl = false, inOl = false;
  const closeLists = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  };
  for (let line of lines) {
    const ul = line.match(/^\s*[-*•]\s+(.+)$/);
    const ol = line.match(/^\s*\d+[.)]\s+(.+)$/);
    if (ul) {
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (!inUl) { out.push('<ul class="md-ul">'); inUl = true; }
      out.push(`<li>${ul[1]}</li>`);
    } else if (ol) {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (!inOl) { out.push('<ol class="md-ol">'); inOl = true; }
      out.push(`<li>${ol[1]}</li>`);
    } else if (line.trim() === '') {
      closeLists();
      out.push('');
    } else if (line.startsWith('<div class="md-h') || line.startsWith('<pre')) {
      closeLists();
      out.push(line);
    } else {
      closeLists();
      out.push(`<p class="md-p">${line}</p>`);
    }
  }
  closeLists();
  return out.join('\n').replace(/\n{2,}/g, '\n');
}

// ── Wiki Viewer ───────────────────────────────────────────────────────────────

// Render wiki page content (like renderMarkdown, but turns *.md source filenames
// that appear as text content into clickable source-file links).
function renderWikiContent(src) {
  let html = renderMarkdown(src);
  // Replace *.md filenames that appear as text (not inside HTML attribute values).
  // Heuristic: if the last '<' before the match is after the last '>', we're inside
  // a tag and should skip; otherwise it's visible text content.
  html = html.replace(/\b([a-z0-9][a-zA-Z0-9_\-]{2,79}\.md)\b/g,
    (fn, _offset, str) => {
      const before = str.substring(0, _offset);
      if (before.lastIndexOf('<') > before.lastIndexOf('>')) return fn; // inside a tag
      return `<a class="src-link" href="#" data-source="${fn}" ` +
             `onclick="viewSourceFile(this);return false;" title="查看原始文件">${fn}</a>`;
    }
  );
  return html;
}

function _showInViewer(title, html) {
  document.getElementById('wiki-viewer-title').textContent = title;
  document.getElementById('wiki-viewer-back').style.display =
    viewerHistory.length > 0 ? '' : 'none';
  const body = document.getElementById('wiki-viewer-body');
  body.innerHTML = html;
  body.scrollTop = 0;
  document.getElementById('wiki-viewer').style.display = 'flex';
}

function openWikiViewer(title, html, domain) {
  currentViewDomain = domain || document.getElementById('chat-sel').value;
  viewerHistory = [];
  _showInViewer(title, html);
}

function pushViewer(title, html) {
  viewerHistory.push({
    title: document.getElementById('wiki-viewer-title').textContent,
    html: document.getElementById('wiki-viewer-body').innerHTML,
  });
  _showInViewer(title, html);
}

function backViewer() {
  if (!viewerHistory.length) return;
  const prev = viewerHistory.pop();
  _showInViewer(prev.title, prev.html);
}

function closeWikiViewer() {
  document.getElementById('wiki-viewer').style.display = 'none';
  viewerHistory = [];
  currentViewDomain = '';
}

async function viewWikiPage(el) {
  const name = el.dataset.wiki;
  const domain = currentViewDomain || document.getElementById('chat-sel').value;
  if (!domain || !name) return;
  const isOpen = document.getElementById('wiki-viewer').style.display === 'flex';
  try {
    const resp = await fetch(
      `/api/wiki/find/${encodeURIComponent(domain)}?name=${encodeURIComponent(name)}`
    );
    if (!resp.ok) {
      const html = `<p class="md-p" style="color:var(--muted)">未找到知识库页面：[[${name}]]</p>`;
      isOpen ? pushViewer(name, html) : openWikiViewer(name, html, domain);
      return;
    }
    const data = await resp.json();
    const html = renderWikiContent(data.content);
    isOpen ? pushViewer(name, html) : openWikiViewer(name, html, domain);
  } catch(e) { console.error('viewWikiPage:', e); }
}

async function viewSourceFile(el) {
  const filename = el.dataset.source;
  const domain = currentViewDomain || document.getElementById('chat-sel').value;
  if (!domain || !filename) return;
  try {
    const resp = await fetch(
      `/api/source/${encodeURIComponent(domain)}/${encodeURIComponent(filename)}`
    );
    if (!resp.ok) {
      pushViewer(filename, `<p class="md-p" style="color:var(--muted)">未找到源文件：${filename}</p>`);
      return;
    }
    const data = await resp.json();
    const html = `<div class="source-badge">📄 原始文件：${filename}</div>` +
                 renderMarkdown(data.content);
    pushViewer(filename, html);
  } catch(e) { console.error('viewSourceFile:', e); }
}

function addChatBubble(role, text, id) {
  const c = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = `msg-row ${role}`;
  const avatar = role === 'user' ? '👤' : '🤖';
  div.innerHTML =
    `<div class="msg-avatar">${avatar}</div>` +
    `<div class="msg-bubble"${id ? ` id="${id}"` : ''}>${esc(text)}</div>`;
  c.appendChild(div);
  scrollChat();
}

function addTypingIndicator() {
  const id = 'ty' + Date.now();
  const c = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg-row assistant';
  div.innerHTML =
    `<div class="msg-avatar">🤖</div>` +
    `<div class="msg-bubble"><span class="typing-dots">` +
    `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>` +
    `</span></div>`;
  c.appendChild(div);
  scrollChat();
  return id;
}

function removeEl(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollChat() {
  const c = document.getElementById('chat-msgs');
  c.scrollTop = c.scrollHeight;
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
