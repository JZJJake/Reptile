<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reptile — 智能知识库系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 48px 40px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 16px 48px rgba(0,0,0,.4);
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo .icon { font-size: 48px; line-height: 1; }
  .logo h1 { font-size: 22px; font-weight: 700; color: #f0f6fc; margin-top: 10px; }
  .logo p  { font-size: 13px; color: #8b949e; margin-top: 4px; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }

  input[type=password], input[type=text] {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Consolas', monospace;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #388bfd; }

  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    background: #238636;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    letter-spacing: .02em;
  }
  .btn:hover:not(:disabled) { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
  }
  .msg.error   { background: #2d1317; border: 1px solid #6e211f; color: #f85149; }
  .msg.success { background: #16302b; border: 1px solid #196c2e; color: #3fb950; }
  .msg.loading { background: #1f2d3d; border: 1px solid #1f6feb; color: #58a6ff; }

  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: #6e7681;
    text-align: center;
    line-height: 1.6;
  }
  .hint a { color: #58a6ff; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(88,166,255,.3);
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="icon">🦎</div>
    <h1>Reptile 智能知识库</h1>
    <p>请输入您的 DeepSeek API Key 以继续</p>
  </div>

  <div class="form-group">
    <label for="apikey">DeepSeek API Key</label>
    <input type="password" id="apikey"
           placeholder="sk-xxxxxxxxxxxxxxxx"
           autocomplete="off"
           onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">验证并进入系统</button>

  <div class="msg" id="msg"></div>

  <div class="hint">
    API Key 仅存储在本地会话中，不会上传到任何服务器。<br>
    获取 Key：<a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a>
  </div>
</div>

<script>
async function doLogin() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) { showMsg('error', '请输入 API Key'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  showMsg('loading', '<span class="spinner"></span>正在验证 API Key，请稍候...');

  try {
    const r = await fetch('/api/auth/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: key }),
    });
    const d = await r.json();

    if (d.valid) {
      sessionStorage.setItem('api_key', key);
      showMsg('success', '✅ 验证成功，正在进入系统...');
      setTimeout(() => { window.location.href = '/app'; }, 800);
    } else {
      showMsg('error', '❌ API Key 无效，请检查后重试');
      btn.disabled = false;
    }
  } catch (e) {
    showMsg('error', `网络错误: ${e.message}`);
    btn.disabled = false;
  }
}

function showMsg(type, html) {
  const el = document.getElementById('msg');
  el.className = `msg ${type}`;
  el.innerHTML = html;
  el.style.display = 'block';
}

// If already logged in, redirect directly
if (sessionStorage.getItem('api_key')) {
  window.location.href = '/app';
}
</script>
</body>
</html>
